<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>논문 상세 | ETC 문헌모니터링</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #003366; --navy2: #1a4a7a;
  --orange: #E87722; --blue: #1A5276;
  --green: #1e7e34; --red: #CC0000;
  --gray1: #f8f9fa; --gray2: #e9ecef;
  --gray3: #dee2e6; --gray4: #6c757d;
  --white: #fff;
  --shadow: 0 2px 8px rgba(0,0,0,.10);
  --radius: 10px;
}
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f0f4f8; color:#222; font-size:14px; line-height:1.6; }

/* 헤더 */
header {
  background: var(--navy); color: var(--white);
  padding: 0 32px; display: flex; align-items: center; justify-content: space-between;
  height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,.25);
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-badge {
  background: var(--orange); color: var(--white);
  font-weight: 700; font-size: 11px;
  padding: 3px 8px; border-radius: 4px; letter-spacing: .5px;
}
header h1 { font-size: 17px; font-weight: 700; }
.back-link {
  color: var(--white); text-decoration: none;
  background: rgba(255,255,255,.15); padding: 6px 14px;
  border-radius: 6px; font-size: 13px; transition: background .15s;
}
.back-link:hover { background: rgba(255,255,255,.25); }

/* 컨테이너 */
main { max-width: 860px; margin: 28px auto; padding: 0 16px; }

/* 로딩/에러 */
.state {
  background: var(--white); border-radius: var(--radius);
  padding: 60px 20px; text-align: center; color: var(--gray4);
  box-shadow: var(--shadow);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gray3); border-top-color: var(--navy);
  border-radius: 50%; animation: spin .8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 논문 상세 카드 */
.paper-detail {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 0;
  border-left: 6px solid var(--gray3); overflow: hidden;
}
.paper-detail.star3 { border-left-color: var(--orange); }
.paper-detail.star2 { border-left-color: var(--blue); }
.paper-detail.star1 { border-left-color: var(--gray3); }

/* 상단 메타 영역 */
.paper-head { padding: 22px 28px 18px; border-bottom: 1px solid var(--gray2); }
.paper-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: .2px;
}
.badge-new { background:#fff3e0; color:var(--orange); border:1px solid var(--orange); }
.badge-direct { background:#e8f4fd; color:var(--blue); border:1px solid var(--blue); }
.badge-ref { background:#f3f3f3; color:#555; border:1px solid #ccc; }
.badge-design { background:#f3f3f3; color:#555; border:1px solid #ccc; }
.badge-session { background:#e8eaf6; color:var(--navy); border:1px solid #b0bcd4; }
.stars { font-size: 14px; letter-spacing: 1px; }
.star-filled { color:#f5a623; } .star-empty { color:#ddd; }

.paper-title {
  font-size: 20px; font-weight: 700; color:#1a1a1a;
  line-height: 1.45; word-break: break-word;
}
.paper-meta-row {
  font-size: 12.5px; color: var(--gray4);
  margin-top: 10px; display: flex; flex-wrap: wrap; gap: 14px;
}
.paper-meta-row strong { color: var(--navy); font-weight: 600; }

/* 본문 섹션 */
.paper-body { padding: 22px 28px 24px; }

.section { margin-bottom: 22px; }
.section:last-child { margin-bottom: 0; }
.section-label {
  font-size: 11.5px; font-weight: 700; color: var(--gray4);
  text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* 5-파트 요약 */
.summary-grid { display: flex; flex-direction: column; gap: 0; }
.summary-row {
  display: flex; gap: 0;
  border-top: 1px solid var(--gray2);
  padding: 10px 0;
}
.summary-row:first-child { border-top: none; padding-top: 0; }
.summary-label {
  min-width: 100px; max-width: 100px;
  font-size: 12px; font-weight: 700;
  color: var(--navy); padding-right: 12px; padding-top: 2px;
  flex-shrink: 0;
}
.summary-text {
  font-size: 14px; line-height: 1.7; color: #333;
  flex: 1; word-break: break-word;
}

/* 핵심 수치 */
.knum-row { display: flex; flex-wrap: wrap; gap: 8px; }
.knum-item {
  background:#fff8f0; border:1px solid #f0c090;
  border-radius: 8px; padding: 7px 13px;
  font-size: 13px; font-weight: 600; color:#7a3500;
}

/* 활용 포인트 */
.key-point-box {
  background:#fff8f0;
  border-left: 4px solid var(--orange);
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  font-size: 14px; line-height: 1.7; color:#333;
  white-space: pre-wrap;
}

/* 원문 텍스트 fallback */
.raw-text {
  font-size: 14px; line-height: 1.7; color:#333;
  white-space: pre-wrap; word-break: break-word;
}

/* 하단 액션 */
.action-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 18px 28px; background: var(--gray1);
  border-top: 1px solid var(--gray2);
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 7px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none; border: 1px solid transparent;
  transition: all .15s;
}
.btn-primary { background: var(--navy); color: var(--white); border-color: var(--navy); }
.btn-primary:hover { background: var(--navy2); }
.btn-outline { background: var(--white); color: var(--navy); border-color: var(--gray3); }
.btn-outline:hover { background: var(--gray1); border-color: var(--navy); }
.btn-bd { background: var(--white); color: var(--orange); border-color: var(--orange); }
.btn-bd:hover { background:#fff3e0; }
.btn-bd.done { background:#fff3e0; color: var(--orange); cursor: default; }
.btn-bd.loading { opacity:.6; cursor: wait; }
.btn-drive { background:#e8f4fd; color: var(--blue); border-color: var(--blue); }
.btn-ref { background: var(--white); color:#6c5b00; border-color:#d9c570; }
.btn-ref:hover { background:#fffbe6; }

/* 토스트 */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background:#333; color: var(--white);
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; opacity: 0; transition: opacity .3s;
  z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; }

/* BD 모달 */
.bd-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:2000; align-items:center; justify-content:center; }
.bd-modal-overlay.show { display:flex; }
.bd-modal { background:#fff; border-radius:12px; padding:28px 28px 22px; min-width:320px; max-width:440px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,.2); }
.bd-modal h3 { font-size:16px; color:var(--navy); margin:0 0 4px; }
.bd-modal .modal-sub { font-size:12px; color:#888; margin:0 0 18px; }
.bd-modal label { display:block; font-size:12px; color:#555; margin:14px 0 7px; font-weight:700; letter-spacing:.3px; }
.bd-color-chips, .bd-format-row { display:flex; gap:8px; flex-wrap:wrap; }
.color-chip, .format-chip { padding:6px 16px; border-radius:20px; border:2px solid transparent; cursor:pointer; font-size:12px; font-weight:600; user-select:none; transition: border-color .15s; }
.color-chip.selected { border-color: var(--navy) !important; }
.format-chip { border:2px solid #ddd; background:#f5f5f5; color:#555; }
.format-chip.selected { border-color: var(--navy); background: var(--navy); color:#fff; }
.bd-modal textarea { width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:13px; resize:vertical; min-height:72px; font-family:inherit; color:#333; outline:none; }
.bd-modal textarea:focus { border-color: var(--navy); }
.bd-modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

@media (max-width: 600px) {
  header { padding: 0 16px; }
  header h1 { font-size: 15px; }
  main { padding: 0 8px; margin: 16px auto; }
  .paper-head, .paper-body, .action-bar { padding-left: 18px; padding-right: 18px; }
  .summary-label { min-width: 80px; max-width: 80px; font-size: 11px; }
  .paper-title { font-size: 17px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo-badge">한올바이오파마</span>
    <h1>논문 상세</h1>
  </div>
  <a class="back-link" href="문헌모니터링_대시보드.html">← 대시보드</a>
</header>

<main id="mainContent">
  <div class="state" id="loadingEl">
    <div class="spinner"></div>
    <div>논문 데이터를 불러오는 중입니다…</div>
  </div>
</main>

<!-- BD 신청 모달 -->
<div class="bd-modal-overlay" id="bdModal">
  <div class="bd-modal">
    <h3>📌 BD 소재 신청</h3>
    <p class="modal-sub" id="bdModalTitle"></p>
    <label>색상 테마</label>
    <div class="bd-color-chips" id="bdColorChips">
      <span class="color-chip selected" data-color="기본" style="background:#e8eaf6;color:#003366">기본 (Navy)</span>
      <span class="color-chip" data-color="레드" style="background:#fce4e4;color:#cc0000">레드</span>
      <span class="color-chip" data-color="블루" style="background:#e3f0fb;color:#1a5276">블루</span>
      <span class="color-chip" data-color="그린" style="background:#e8f5e9;color:#2e7d32">그린</span>
    </div>
    <label>포맷</label>
    <div class="bd-format-row" id="bdFormatChips">
      <span class="format-chip selected" data-fmt="CLB">CLB 학술브리프</span>
      <span class="format-chip" data-fmt="BT">BT 바이오톡</span>
    </div>
    <label>요청사항 <span style="font-weight:400;color:#aaa">(선택)</span></label>
    <textarea id="bdPmRequest" placeholder="예) 3페이지로 확장 / 특정 수치 강조 / 그림 추가..."></textarea>
    <div class="bd-modal-actions">
      <button class="btn btn-outline" onclick="closeBDModal()">취소</button>
      <button class="btn btn-primary" onclick="submitBDModal()">신청하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  SHEET_ID: '1TrG81tjb_8iakCm5IwwFH5EFoNUNienhyPT9aE8ya-Q',
  SHEET_NAME: '논문DB',
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzowQMXLavFOx-6hXYn2ESwHVc6nmsFOlEx4JOyTDpONBrr4FQNaK3TRAfqi5gR2v6S/exec',
};

/* 세션별 월간/주간 리포트 URL 매핑 (대시보드와 동일) */
const REPORT_URLS = {
  '2026년 4월': {
    '장내미생물': '문헌모니터링_1주차_장내미생물_2026-04-06.html',
    '골대사·신경': '문헌모니터링_2주차_골대사신경_2026-04-13.html',
    '탈모치료': '문헌모니터링_3주차_탈모치료_2026-04-20.html',
    '비뇨기·종양·CPP': '문헌모니터링_4주차_비뇨기종양_2026-04-27.html',
    'Gut-Liver Axis': '문헌모니터링_5주차_GutLiverAxis_2026-05-04.html',
  },
  '2026년 4월 통합': {
    '장내미생물': '문헌모니터링_4월_장내미생물_20260423.html',
    '골대사·신경': '문헌모니터링_4월_골대사신경_20260423.html',
    '탈모치료': '문헌모니터링_4월_탈모치료_20260423.html',
    '비뇨기·종양·CPP': '문헌모니터링_4월_비뇨기종양CPP_20260423.html',
    'Gut-Liver Axis': '문헌모니터링_4월_Gut-Liver_Axis_20260423.html',
  }
};
function getReportUrl(sessionKey, month) {
  return (REPORT_URLS[month] && REPORT_URLS[month][sessionKey]) || null;
}

/* 5-파트 요약 파싱 */
const SUMMARY_LABELS = ['배경', '대상/방법', '핵심 결과', '안전성', '결론 및 한계'];
function parseSummaryHtml(text) {
  if (!text) return '';
  const hasStructure = SUMMARY_LABELS.some(l => text.includes(l + ':'));
  if (!hasStructure) {
    return `<div class="raw-text">${escHtml(text).replace(/\n/g,'<br>')}</div>`;
  }
  const sections = {};
  let knumLines = [];
  let currentKey = null, currentBuf = [], inKnum = false;
  text.split('\n').forEach(raw => {
    const line = raw.replace(/^[\s•\-]+/, '');
    if (/^핵심\s*수치\s*:?/.test(line)) {
      if (currentKey) { sections[currentKey] = currentBuf.join('\n').trim(); currentBuf = []; }
      currentKey = null; inKnum = true;
      const rest = line.replace(/^핵심\s*수치\s*:?\s*/, '');
      if (rest) knumLines.push(rest);
    } else {
      const found = SUMMARY_LABELS.find(l => line.startsWith(l + ':'));
      if (found) {
        if (inKnum) inKnum = false;
        if (currentKey) { sections[currentKey] = currentBuf.join('\n').trim(); currentBuf = []; }
        currentKey = found;
        const rest = line.slice(found.length + 1).trim();
        if (rest) currentBuf.push(rest);
      } else if (inKnum && line.trim()) {
        knumLines.push(line.trim());
      } else if (currentKey) {
        currentBuf.push(raw.replace(/^[\s•]+/, ''));
      }
    }
  });
  if (currentKey) sections[currentKey] = currentBuf.join('\n').trim();

  let html = '';
  const hasRows = SUMMARY_LABELS.some(l => sections[l]);
  if (hasRows) {
    html += '<div class="summary-grid">';
    SUMMARY_LABELS.forEach(label => {
      if (sections[label]) {
        html += `<div class="summary-row">
          <div class="summary-label">${escHtml(label)}</div>
          <div class="summary-text">${escHtml(sections[label]).replace(/\n/g,'<br>')}</div>
        </div>`;
      }
    });
    html += '</div>';
  }
  return { gridHtml: html, knumLines };
}

/* gviz 날짜 포맷 */
function formatGvizMonth(val) {
  if (!val) return '';
  const m = val.match(/^Date\((\d+),(\d+),\d+\)$/);
  if (m) return `${m[1]}년 ${parseInt(m[2])+1}월`;
  return val;
}
function formatGvizDate(val) {
  if (!val) return '';
  const m = val.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if (m) return `${m[1]}-${String(parseInt(m[2])+1).padStart(2,'0')}-${String(parseInt(m[3])).padStart(2,'0')}`;
  return val;
}

/* URL 쿼리 파라미터 파싱 */
function getQueryParam(name) {
  const p = new URLSearchParams(window.location.search);
  return p.get(name) || '';
}

/* 제목 매칭용 정규화 */
function normalizeTitle(s) {
  return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase();
}

/* 데이터 로드 */
function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  const script = document.createElement('script');
  window.google = window.google || {};
  window.google.visualization = window.google.visualization || {};
  window.google.visualization.Query = window.google.visualization.Query || {};
  window.google.visualization.Query.setResponse = function(resp) {
    if (resp.status !== 'ok') return showError('시트 데이터를 불러오지 못했습니다.');
    parseAndRender(resp.table);
  };
  script.onerror = () => showError('Google Sheets 연결 실패');
  script.src = url;
  document.head.appendChild(script);
}

function parseAndRender(table) {
  const papers = table.rows
    .filter(r => r.c && r.c[0] && r.c[0].v)
    .map(r => {
      const g = (i) => (r.c[i] && r.c[i].v !== null && r.c[i].v !== undefined) ? String(r.c[i].v) : '';
      return {
        title: g(0), isNew: g(1) === 'NEW',
        session: g(2), stars: g(3), evidence: g(4),
        journal: g(5), pubDate: formatGvizDate(g(6)),
        design: g(7), url: g(8), pm: g(9),
        month: formatGvizMonth(g(10)),
        summary: g(11), keyPoint: g(12),
        bdReq: g(13).toLowerCase()==='true',
        bdDone: g(14).toLowerCase()==='true',
        bdFormat: g(15), driveLink: g(16)
      };
    });

  const targetTitle = getQueryParam('t');
  if (!targetTitle) return showError('논문 제목이 지정되지 않았습니다. 대시보드에서 상세 리포트 버튼을 눌러 주세요.');

  const target = normalizeTitle(targetTitle);
  let paper = papers.find(p => normalizeTitle(p.title) === target);
  if (!paper) {
    // 부분 매칭 fallback
    paper = papers.find(p => {
      const n = normalizeTitle(p.title);
      return n && (n.includes(target.substring(0, 40)) || target.includes(n.substring(0, 40)));
    });
  }
  if (!paper) return showError(`해당 논문을 찾을 수 없습니다: "${escHtml(targetTitle)}"`);

  renderPaper(paper);
}

function renderPaper(p) {
  document.title = `${p.title.substring(0,60)} | ETC 문헌모니터링`;

  const starClass = p.stars === '★★★' ? 'star3' : p.stars === '★★☆' ? 'star2' : 'star1';
  const starsHtml = renderStars(p.stars);
  const newBadge = p.isNew ? `<span class="badge badge-new">✦ NEW</span>` : '';
  const evBadge = p.evidence === '직접근거'
    ? `<span class="badge badge-direct">🔵 직접근거</span>`
    : `<span class="badge badge-ref">◎ 참고근거</span>`;
  const designBadge = p.design ? `<span class="badge badge-design">${escHtml(p.design)}</span>` : '';
  const sessionBadge = p.session ? `<span class="badge badge-session">${escHtml(p.session)}</span>` : '';

  // 요약
  let summaryBlock = '';
  if (p.summary) {
    const parsed = parseSummaryHtml(p.summary);
    if (typeof parsed === 'string') {
      summaryBlock = `<div class="section">
        <div class="section-label">📋 논문 요약</div>
        ${parsed}
      </div>`;
    } else {
      summaryBlock = `<div class="section">
        <div class="section-label">📋 논문 요약</div>
        ${parsed.gridHtml}
      </div>`;
      if (parsed.knumLines && parsed.knumLines.length) {
        summaryBlock += `<div class="section">
          <div class="section-label">📊 핵심 수치</div>
          <div class="knum-row">
            ${parsed.knumLines.map(l => `<div class="knum-item">${escHtml(l)}</div>`).join('')}
          </div>
        </div>`;
      }
    }
  }

  const keyPointBlock = p.keyPoint
    ? `<div class="section">
         <div class="section-label">💡 활용 포인트</div>
         <div class="key-point-box">${escHtml(p.keyPoint).replace(/\n/g,'<br>')}</div>
       </div>`
    : '';

  // 하단 액션
  const urlBtn = p.url
    ? `<a class="btn btn-outline" href="${p.url}" target="_blank">📄 논문 원문 ↗</a>` : '';

  let bdBtn = '';
  if (p.bdDone && p.driveLink) {
    bdBtn = `<a class="btn btn-drive" href="${p.driveLink}" target="_blank">📂 BD자료 보기</a>`;
  } else if (p.bdDone) {
    bdBtn = `<span class="btn btn-bd done">✅ BD 생성완료</span>`;
  } else if (p.bdReq) {
    bdBtn = `<span class="btn btn-bd done">✅ BD 신청됨</span>`;
  } else {
    bdBtn = `<button class="btn btn-bd" onclick="requestBD(event, ${JSON.stringify(p.title).replace(/"/g,'&quot;')})">📌 BD 신청</button>`;
  }

  const refReportUrl = getReportUrl(p.session, p.month);
  const refBtn = refReportUrl
    ? `<a class="btn btn-ref" href="${refReportUrl}#t=${encodeURIComponent(p.title)}" target="_blank">📚 세션 전체 리포트에서 보기 ↗</a>`
    : '';

  const metaParts = [];
  if (p.journal) metaParts.push(`<span><strong>저널</strong> ${escHtml(p.journal)}</span>`);
  if (p.pubDate) metaParts.push(`<span><strong>발행</strong> ${escHtml(p.pubDate)}</span>`);
  if (p.session) metaParts.push(`<span><strong>세션</strong> ${escHtml(p.session)}</span>`);
  if (p.pm) metaParts.push(`<span><strong>PM</strong> ${escHtml(p.pm)}</span>`);
  if (p.month) metaParts.push(`<span><strong>수록월</strong> ${escHtml(p.month)}</span>`);

  const html = `
    <article class="paper-detail ${starClass}">
      <div class="paper-head">
        <div class="paper-badges">
          ${newBadge}
          <span class="stars">${starsHtml}</span>
          ${evBadge}
          ${designBadge}
          ${sessionBadge}
        </div>
        <div class="paper-title">${escHtml(p.title)}</div>
        <div class="paper-meta-row">${metaParts.join('')}</div>
      </div>
      <div class="paper-body">
        ${summaryBlock || '<div class="raw-text" style="color:#999">요약 데이터가 없습니다.</div>'}
        ${keyPointBlock}
      </div>
      <div class="action-bar">
        ${urlBtn}
        ${bdBtn}
        ${refBtn}
      </div>
    </article>
  `;

  document.getElementById('mainContent').innerHTML = html;
}

function renderStars(s) {
  const map = { '★★★':3, '★★☆':2, '★☆☆':1 };
  const n = map[s] || 0;
  return [1,2,3].map(i => `<span class="${i<=n?'star-filled':'star-empty'}">★</span>`).join('');
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state" style="color:#c00">
      <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
      <div style="font-size:14px;line-height:1.6;">${msg}</div>
      <a class="btn btn-outline" style="margin-top:20px" href="문헌모니터링_대시보드.html">← 대시보드로 돌아가기</a>
    </div>`;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

/* BD 신청 */
let _bdTitle = '', _bdBtn = null;
function requestBD(evt, title) {
  evt.stopPropagation();
  _bdTitle = title; _bdBtn = evt.target;
  document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector('.color-chip[data-color="기본"]').classList.add('selected');
  document.querySelectorAll('.format-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector('.format-chip[data-fmt="CLB"]').classList.add('selected');
  document.getElementById('bdPmRequest').value = '';
  document.getElementById('bdModalTitle').textContent = title.length>60 ? title.substring(0,60)+'…' : title;
  document.getElementById('bdModal').classList.add('show');
}
function closeBDModal() { document.getElementById('bdModal').classList.remove('show'); }

function submitBDModal() {
  const colorTheme = document.querySelector('.color-chip.selected')?.dataset.color || '기본';
  const fmt = document.querySelector('.format-chip.selected')?.dataset.fmt || 'CLB';
  const pmRequest = document.getElementById('bdPmRequest').value.trim();
  const btn = _bdBtn, title = _bdTitle;
  closeBDModal();

  btn.textContent = '신청 중…'; btn.classList.add('loading');
  const cbName = '_bdCb_' + Date.now();
  window[cbName] = function(data) {
    if (data.status === 'ok') {
      btn.textContent = '✅ BD 신청됨';
      btn.classList.remove('loading'); btn.classList.add('done'); btn.disabled = true;
      showToast('✅ BD 신청 완료!' + (pmRequest?' (요청: '+pmRequest.substring(0,20)+')':''));
    } else {
      btn.textContent = '📌 BD 신청'; btn.classList.remove('loading');
      showToast('⚠️ 오류: ' + (data.message||'알 수 없는 오류'));
    }
    delete window[cbName];
  };
  const sc = document.createElement('script');
  sc.src = `${CONFIG.SCRIPT_URL}?action=requestBD`
    + `&title=${encodeURIComponent(title)}`
    + `&format=${encodeURIComponent(fmt)}`
    + `&colorTheme=${encodeURIComponent(colorTheme)}`
    + `&pmRequest=${encodeURIComponent(pmRequest)}`
    + `&callback=${cbName}`;
  sc.onerror = () => {
    btn.textContent = '📌 BD 신청'; btn.classList.remove('loading');
    showToast('⚠️ 네트워크 오류');
  };
  document.head.appendChild(sc);
}

/* 초기 실행 */
loadData();
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bdColorChips').addEventListener('click', (e) => {
    const chip = e.target.closest('.color-chip'); if (!chip) return;
    document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });
  document.getElementById('bdFormatChips').addEventListener('click', (e) => {
    const chip = e.target.closest('.format-chip'); if (!chip) return;
    document.querySelectorAll('.format-chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
  });
  document.getElementById('bdModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('bdModal')) closeBDModal();
  });
});
</script>
